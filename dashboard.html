<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstantDesk — Triage Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f4f6f9;
      color: #1a1d27;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e2e5ee;
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo {
      font-size: 1.15rem;
      font-weight: 700;
      color: #5b4ef0;
      letter-spacing: -0.02em;
    }
    .logo span { color: #b0aac8; font-weight: 400; }
    .header-meta { color: #8b90a8; font-size: 0.82rem; margin-left: auto; }

    /* ── Layout ── */
    main { max-width: 1280px; margin: 0 auto; padding: 28px 32px; }

    /* ── Summary cards ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #e2e5ee;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-card .label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #8b90a8;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card .sub { font-size: 0.78rem; color: #8b90a8; }
    .stat-total    .value { color: #1a1d27; }
    .stat-resolved .value { color: #16a34a; }
    .stat-escalated .value { color: #dc2626; }
    .stat-pending  .value { color: #ca8a04; }

    /* ── Filters ── */
    .filters {
      background: #fff;
      border: 1px solid #e2e5ee;
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .filters label { font-size: 0.8rem; font-weight: 600; color: #5b6480; }
    .filters select {
      font-size: 0.85rem;
      border: 1px solid #d1d5e0;
      border-radius: 6px;
      padding: 6px 10px;
      background: #f8f9fc;
      color: #1a1d27;
      cursor: pointer;
      outline: none;
    }
    .filters select:focus { border-color: #5b4ef0; }
    .filter-reset {
      margin-left: auto;
      font-size: 0.8rem;
      color: #5b4ef0;
      cursor: pointer;
      background: none;
      border: none;
      font-weight: 600;
    }
    .filter-reset:hover { text-decoration: underline; }

    /* ── Table wrapper ── */
    .table-wrap {
      background: #fff;
      border: 1px solid #e2e5ee;
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr {
      background: #f8f9fc;
      border-bottom: 1px solid #e2e5ee;
    }
    th {
      text-align: left;
      padding: 11px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #5b6480;
      white-space: nowrap;
    }

    tbody tr.main-row {
      border-bottom: 1px solid #f0f2f7;
      cursor: pointer;
      transition: background 0.12s;
    }
    tbody tr.main-row:hover { background: #f8f9fc; }
    tbody tr.main-row.expanded { background: #f3f0ff; border-bottom: none; }

    td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    .ticket-id {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.82rem;
      color: #5b4ef0;
      font-weight: 600;
    }
    .subject {
      color: #1a1d27;
      font-weight: 500;
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Queue badge ── */
    .queue-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .q-accounts       { background: #ede9fe; color: #5b21b6; }
    .q-networking     { background: #dbeafe; color: #1d4ed8; }
    .q-hardware       { background: #fef3c7; color: #92400e; }
    .q-software       { background: #d1fae5; color: #065f46; }
    .q-security       { background: #fee2e2; color: #991b1b; }
    .q-infrastructure { background: #e0f2fe; color: #075985; }

    /* ── Priority badge ── */
    .priority-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .p-P1 { background: #fecaca; color: #7f1d1d; border: 1px solid #fca5a5; }
    .p-P2 { background: #fed7aa; color: #7c2d12; border: 1px solid #fdba74; }
    .p-P3 { background: #fef08a; color: #713f12; border: 1px solid #fde047; }
    .p-P4 { background: #bbf7d0; color: #14532d; border: 1px solid #86efac; }
    .priority-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .p-P1 .priority-dot { background: #dc2626; }
    .p-P2 .priority-dot { background: #ea580c; }
    .p-P3 .priority-dot { background: #ca8a04; }
    .p-P4 .priority-dot { background: #16a34a; }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.76rem;
      font-weight: 600;
    }
    .s-resolved  { background: #dcfce7; color: #15803d; }
    .s-escalated { background: #fee2e2; color: #b91c1c; }
    .s-pending   { background: #fef9c3; color: #a16207; }
    .status-icon { font-size: 0.7rem; }

    /* ── Confidence bar ── */
    .confidence-cell { min-width: 100px; }
    .conf-wrap { display: flex; align-items: center; gap: 8px; }
    .conf-bar-bg {
      flex: 1;
      height: 5px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
    }
    .conf-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .conf-bar-fill.high   { background: #16a34a; }
    .conf-bar-fill.medium { background: #ca8a04; }
    .conf-bar-fill.low    { background: #dc2626; }
    .conf-num { font-size: 0.78rem; color: #5b6480; font-variant-numeric: tabular-nums; width: 32px; text-align: right; }

    /* ── Expand chevron ── */
    .chevron { color: #b0aac8; font-size: 0.75rem; transition: transform 0.2s; }
    .expanded .chevron { transform: rotate(90deg); }

    /* ── Detail row ── */
    tr.detail-row { display: none; }
    tr.detail-row.open {
      display: table-row;
      border-bottom: 1px solid #e2e5ee;
    }
    .detail-cell {
      padding: 0 16px 20px 44px;
      background: #f8f6ff;
    }
    .detail-inner {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding-top: 16px;
    }
    .detail-section h4 {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5b4ef0;
      margin-bottom: 8px;
    }
    .detail-section p {
      font-size: 0.85rem;
      color: #3a3f55;
      line-height: 1.6;
    }
    .trigger-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .trigger-tag {
      font-family: 'Cascadia Code', monospace;
      font-size: 0.72rem;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 4px;
      padding: 2px 7px;
      font-weight: 600;
    }
    .trigger-tag.none { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
    .step-list { list-style: none; padding: 0; }
    .step-list li {
      font-size: 0.83rem;
      color: #3a3f55;
      padding: 3px 0;
      padding-left: 16px;
      position: relative;
      line-height: 1.5;
    }
    .step-list li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: #16a34a;
      font-size: 0.75rem;
    }
    .cannot-resolve {
      font-size: 0.82rem;
      color: #6b7280;
      font-style: italic;
    }

    /* ── Empty state ── */
    .empty-row td {
      text-align: center;
      padding: 48px 16px;
      color: #8b90a8;
    }

    /* ── Responsive tweak ── */
    @media (max-width: 900px) {
      .summary { grid-template-columns: repeat(2, 1fr); }
      .detail-inner { grid-template-columns: 1fr; }
      main { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">InstantDesk <span>/ Triage Dashboard</span></div>
  <div class="header-meta" id="run-meta">Loading…</div>
</header>

<main>

  <!-- Summary -->
  <div class="summary">
    <div class="stat-card stat-total">
      <div class="label">Total tickets</div>
      <div class="value" id="cnt-total">—</div>
      <div class="sub">processed this run</div>
    </div>
    <div class="stat-card stat-resolved">
      <div class="label">Auto-resolved</div>
      <div class="value" id="cnt-resolved">—</div>
      <div class="sub">no human needed</div>
    </div>
    <div class="stat-card stat-escalated">
      <div class="label">Escalated</div>
      <div class="value" id="cnt-escalated">—</div>
      <div class="sub">sent to human queue</div>
    </div>
    <div class="stat-card stat-pending">
      <div class="label">Awaiting human</div>
      <div class="value" id="cnt-pending">—</div>
      <div class="sub">routed, not yet actioned</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <label for="filter-queue">Queue</label>
    <select id="filter-queue" onchange="applyFilters()">
      <option value="">All queues</option>
      <option value="accounts">accounts</option>
      <option value="networking">networking</option>
      <option value="hardware">hardware</option>
      <option value="software">software</option>
      <option value="security">security</option>
      <option value="infrastructure">infrastructure</option>
    </select>

    <label for="filter-status">Status</label>
    <select id="filter-status" onchange="applyFilters()">
      <option value="">All statuses</option>
      <option value="resolved">Auto-resolved</option>
      <option value="escalated">Escalated</option>
      <option value="pending">Pending</option>
    </select>

    <label for="filter-priority">Priority</label>
    <select id="filter-priority" onchange="applyFilters()">
      <option value="">All priorities</option>
      <option value="P1">P1</option>
      <option value="P2">P2</option>
      <option value="P3">P3</option>
      <option value="P4">P4</option>
    </select>

    <button class="filter-reset" onclick="resetFilters()">Reset filters</button>
    <span id="filter-count" style="font-size:0.78rem; color:#8b90a8; margin-left:4px;"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="ticket-table">
      <thead>
        <tr>
          <th style="width:32px;"></th>
          <th>Ticket ID</th>
          <th>Subject</th>
          <th>Queue</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Confidence</th>
          <th>Retries</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

</main>

      "priority": "P1",
      "confidence": 0.87,
      "reasoning": "Third-party claim to reset CEO MFA. Requestor is not the CEO. C-suite impersonation risk — escalate immediately, do not action.",
      "suggested_actions": ["Do not reset MFA without direct CEO confirmation", "Verify via known phone number on record"],
      "retry_count": 0
    },
    "escalation": {
      "ticket_id": "TKT-ADV-005",
      "should_escalate": true,
      "reason": "Escalation required: P1_PRIORITY, CSUITE_REQUESTOR",
      "escalation_triggers": ["P1_PRIORITY", "CSUITE_REQUESTOR"]
    },
    "resolution": null,
    "total_retry_count": 0
  }
];

// Subject lookup (kept separate to avoid bloating CoordinatorOutput)
const SUBJECTS = {
  "TKT-001":     "Can't log in — password expired",
  "TKT-002":     "Account locked — too many failed attempts",
  "TKT-003":     "VPN keeps dropping every 10 minutes",
  "TKT-004":     "Entire sales floor has no internet — 50+ people affected",
  "TKT-005":     "I think my laptop got malware",
  "TKT-006":     "CTO can't access email",
  "TKT-007":     "How do I set up an out-of-office reply?",
  "TKT-008":     "Need Adobe Acrobat installed",
  "TKT-ADV-001": "URGENT password reset",
  "TKT-ADV-002": "Routine software update question",
  "TKT-ADV-003": "CRITICAL URGENT EMERGENCY — need help",
  "TKT-ADV-004": "Access request",
  "TKT-ADV-005": "MFA reset needed",
};

// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────
function getStatus(item) {
  if (item.resolution && item.resolution.resolved) return "resolved";
  if (item.escalation.should_escalate) return "escalated";
  return "pending";
}

function confClass(v) {
  if (v >= 0.80) return "high";
  if (v >= 0.60) return "medium";
  return "low";
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// ─────────────────────────────────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────────────────────────────────
let expandedId = null;

function render(data) {
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";

  if (data.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="8">No tickets match the current filters.</td></tr>`;
    return;
  }

  data.forEach((item, idx) => {
    const status = getStatus(item);
    const q = item.triage.queue;
    const p = item.triage.priority;
    const conf = item.triage.confidence;
    const subject = SUBJECTS[item.ticket_id] || item.ticket_id;
    const isExpanded = expandedId === item.ticket_id;

    // ── Status badge
    const statusBadge = {
      resolved:  `<span class="status-badge s-resolved"><span class="status-icon">✓</span>Auto-resolved</span>`,
      escalated: `<span class="status-badge s-escalated"><span class="status-icon">⚠</span>Escalated</span>`,
      pending:   `<span class="status-badge s-pending"><span class="status-icon">◷</span>Pending</span>`,
    }[status];

    // ── Confidence bar
    const confPct = Math.round(conf * 100);
    const confCls = confClass(conf);
    const confHtml = `
      <div class="conf-wrap">
        <div class="conf-bar-bg"><div class="conf-bar-fill ${confCls}" style="width:${confPct}%"></div></div>
        <span class="conf-num">${confPct}%</span>
      </div>`;

    // ── Main row
    const mainRow = document.createElement("tr");
    mainRow.className = `main-row${isExpanded ? " expanded" : ""}`;
    mainRow.dataset.id = item.ticket_id;
    mainRow.innerHTML = `
      <td><span class="chevron">▶</span></td>
      <td><span class="ticket-id">${escapeHtml(item.ticket_id)}</span></td>
      <td><span class="subject" title="${escapeHtml(subject)}">${escapeHtml(subject)}</span></td>
      <td><span class="queue-badge q-${q}">${q}</span></td>
      <td><span class="priority-badge p-${p}"><span class="priority-dot"></span>${p}</span></td>
      <td>${statusBadge}</td>
      <td class="confidence-cell">${confHtml}</td>
      <td style="color:${item.total_retry_count > 0 ? '#dc2626' : '#8b90a8'}; font-weight:${item.total_retry_count > 0 ? '700' : '400'}">
        ${item.total_retry_count}
      </td>`;
    mainRow.addEventListener("click", () => toggleRow(item.ticket_id));

    // ── Detail row
    const triggers = item.escalation.escalation_triggers;
    const triggersHtml = triggers.length > 0
      ? triggers.map(t => `<span class="trigger-tag">${escapeHtml(t)}</span>`).join("")
      : `<span class="trigger-tag none">none</span>`;

    let resolutionHtml;
    if (status === "resolved" && item.resolution) {
      resolutionHtml = `<ul class="step-list">` +
        item.resolution.resolution_steps.map(s => `<li>${escapeHtml(s)}</li>`).join("") +
        `</ul>`;
    } else if (item.resolution && item.resolution.cannot_auto_resolve_reason) {
      resolutionHtml = `<p class="cannot-resolve">${escapeHtml(item.resolution.cannot_auto_resolve_reason)}</p>`;
    } else {
      resolutionHtml = `<p class="cannot-resolve">—</p>`;
    }

    const detailRow = document.createElement("tr");
    detailRow.className = `detail-row${isExpanded ? " open" : ""}`;
    detailRow.dataset.id = item.ticket_id;
    detailRow.innerHTML = `
      <td colspan="8" class="detail-cell">
        <div class="detail-inner">
          <div class="detail-section">
            <h4>Triage reasoning</h4>
            <p>${escapeHtml(item.triage.reasoning)}</p>
          </div>
          <div class="detail-section">
            <h4>Escalation triggers</h4>
            <div class="trigger-list">${triggersHtml}</div>
            ${triggers.length > 0 ? `<p style="margin-top:8px; font-size:0.8rem; color:#6b7280;">${escapeHtml(item.escalation.reason)}</p>` : ""}
          </div>
          <div class="detail-section">
            <h4>${status === "resolved" ? "Resolution steps" : "Resolution"}</h4>
            ${resolutionHtml}
          </div>
        </div>
      </td>`;

    tbody.appendChild(mainRow);
    tbody.appendChild(detailRow);
  });
}

function toggleRow(id) {
  if (expandedId === id) {
    expandedId = null;
  } else {
    expandedId = id;
  }
  applyFilters(); // re-render with updated expand state
}

// ─────────────────────────────────────────────────────────────────────────────
// Filters
// ─────────────────────────────────────────────────────────────────────────────
function applyFilters() {
  const queueVal    = document.getElementById("filter-queue").value;
  const statusVal   = document.getElementById("filter-status").value;
  const priorityVal = document.getElementById("filter-priority").value;

  const filtered = RAW_DATA.filter(item => {
    if (queueVal    && item.triage.queue     !== queueVal)    return false;
    if (statusVal   && getStatus(item)       !== statusVal)   return false;
    if (priorityVal && item.triage.priority  !== priorityVal) return false;
    return true;
  });

  render(filtered);

  const countEl = document.getElementById("filter-count");
  const active = [queueVal, statusVal, priorityVal].filter(Boolean).length;
  countEl.textContent = active > 0 ? `${filtered.length} of ${RAW_DATA.length} shown` : "";
}

function resetFilters() {
  document.getElementById("filter-queue").value    = "";
  document.getElementById("filter-status").value   = "";
  document.getElementById("filter-priority").value = "";
  expandedId = null;
  applyFilters();
}

// ─────────────────────────────────────────────────────────────────────────────
// Summary cards
// ─────────────────────────────────────────────────────────────────────────────
function buildSummary() {
  const total     = RAW_DATA.length;
  const resolved  = RAW_DATA.filter(d => getStatus(d) === "resolved").length;
  const escalated = RAW_DATA.filter(d => getStatus(d) === "escalated").length;
  const pending   = RAW_DATA.filter(d => getStatus(d) === "pending").length;

  document.getElementById("cnt-total").textContent    = total;
  document.getElementById("cnt-resolved").textContent  = resolved;
  document.getElementById("cnt-escalated").textContent = escalated;
  document.getElementById("cnt-pending").textContent   = pending;

  const now = new Date().toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" });
  document.getElementById("run-meta").textContent = `Last run: ${now}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
buildSummary();
applyFilters();
</script>
</body>
</html>
